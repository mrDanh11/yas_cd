apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: yas-dev
  namespace: argocd
spec:
  description: YAS development environment

  sourceRepos:
    - https://github.com/mrDanh11/yas_cd.git

  destinations:
    - namespace: yas-dev
      server: https://kubernetes.default.svc

  clusterResourceWhitelist:
    - group: '*'
      kind: '*'

  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
