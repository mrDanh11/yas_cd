apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: yas-dev-swagger-ui
  namespace: argocd
spec:
  project: yas-dev

  source:
    repoURL: https://github.com/mrDanh11/yas_cd.git
    targetRevision: main
    path: k8s/charts/swagger-ui
    helm:
      parameters:
        - name: image.repository
          value: mrdanh/yas-swagger-ui
        - name: image.tag
          value: main
        - name: image.pullPolicy
          value: Always
        - name: ingress.className
          value: traefik

  destination:
    server: https://kubernetes.default.svc
    namespace: yas-dev

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
