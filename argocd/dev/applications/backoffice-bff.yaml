apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: yas-dev-backoffice-bff
  namespace: argocd
spec:
  project: yas-dev

  source:
    repoURL: https://github.com/mrDanh11/yas_cd.git
    targetRevision: main
    path: k8s/charts/backoffice-bff
    helm:
      releaseName: backoffice-bff
      parameters:
        - name: backend.image.repository
          value: mrdanh/yas-backoffice-bff
        - name: backend.image.tag
          value: main
        - name: backend.image.pullPolicy
          value: Always
        - name: backend.ingress.className
          value: traefik
        - name: backend.resources.requests.memory
          value: 200Mi
        - name: backend.resources.requests.cpu
          value: 100m
        - name: backend.resources.limits.memory
          value: 350Mi

  destination:
    server: https://kubernetes.default.svc
    namespace: yas-dev

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
